<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="'Segoe UI', system-ui, -apple-system, 'DejaVu Sans', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0c0c"/>
      <stop offset="100%" style="stop-color:#1a1d2e"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="680" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#f0f0f0" stroke-width="0.5">
    <g><line x1="40" y1="0" x2="40" y2="680"/><line x1="80" y1="0" x2="80" y2="680"/><line x1="120" y1="0" x2="120" y2="680"/><line x1="160" y1="0" x2="160" y2="680"/><line x1="200" y1="0" x2="200" y2="680"/><line x1="240" y1="0" x2="240" y2="680"/><line x1="280" y1="0" x2="280" y2="680"/><line x1="320" y1="0" x2="320" y2="680"/><line x1="360" y1="0" x2="360" y2="680"/><line x1="400" y1="0" x2="400" y2="680"/><line x1="440" y1="0" x2="440" y2="680"/><line x1="480" y1="0" x2="480" y2="680"/><line x1="520" y1="0" x2="520" y2="680"/><line x1="560" y1="0" x2="560" y2="680"/><line x1="600" y1="0" x2="600" y2="680"/><line x1="640" y1="0" x2="640" y2="680"/><line x1="680" y1="0" x2="680" y2="680"/><line x1="720" y1="0" x2="720" y2="680"/><line x1="760" y1="0" x2="760" y2="680"/><line x1="800" y1="0" x2="800" y2="680"/><line x1="840" y1="0" x2="840" y2="680"/><line x1="880" y1="0" x2="880" y2="680"/><line x1="920" y1="0" x2="920" y2="680"/><line x1="960" y1="0" x2="960" y2="680"/><line x1="1000" y1="0" x2="1000" y2="680"/><line x1="1040" y1="0" x2="1040" y2="680"/><line x1="1080" y1="0" x2="1080" y2="680"/><line x1="1120" y1="0" x2="1120" y2="680"/><line x1="1160" y1="0" x2="1160" y2="680"/></g>
    <g><line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="280" x2="1200" y2="280"/><line x1="0" y1="320" x2="1200" y2="320"/><line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="440" x2="1200" y2="440"/><line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="520" x2="1200" y2="520"/><line x1="0" y1="560" x2="1200" y2="560"/><line x1="0" y1="600" x2="1200" y2="600"/><line x1="0" y1="640" x2="1200" y2="640"/></g>
  </g>

  <!-- Top kicker -->
  <text x="600" y="68" text-anchor="middle" fill="#b1b4b6" font-size="14" letter-spacing="3" font-weight="600">ARCKIT VALUATION  ·  THE FINANCIAL FLOOR AND THE STRATEGIC PREMIUM</text>

  <!-- Chart baseline -->
  <line x1="340" y1="370" x2="860" y2="370" stroke="#2a2d3e" stroke-width="1"/>

  <!-- Bar 1: Financial investor (£20m, short, GOV.UK blue) -->
  <g filter="url(#cardShadow)">
    <rect x="400" y="320" width="120" height="50" fill="#1d70b8"/>
  </g>
  <text x="460" y="306" text-anchor="middle" fill="#f0f0f0" font-size="24" font-weight="800">£20m</text>
  <text x="460" y="395" text-anchor="middle" fill="#b1b4b6" font-size="12" letter-spacing="2" font-weight="700">FINANCIAL INVESTOR</text>
  <text x="460" y="413" text-anchor="middle" fill="#9b9ea3" font-size="10" font-weight="600">PE / growth equity central estimate</text>

  <!-- Bar 2: Strategic acquirer (£80m, 4x taller, GOV.UK green) -->
  <g filter="url(#cardShadow)">
    <rect x="680" y="170" width="120" height="200" fill="#00703c"/>
  </g>
  <text x="740" y="156" text-anchor="middle" fill="#f0f0f0" font-size="32" font-weight="800">£80m</text>
  <text x="740" y="395" text-anchor="middle" fill="#b1b4b6" font-size="12" letter-spacing="2" font-weight="700">STRATEGIC ACQUIRER</text>
  <text x="740" y="413" text-anchor="middle" fill="#9b9ea3" font-size="10" font-weight="600">Big 4 / hyperscaler / governance SaaS</text>

  <!-- Spread bracket showing the £60m strategic premium between the two bars -->
  <g stroke="#5694ca" stroke-width="1.5" fill="none">
    <line x1="600" y1="170" x2="600" y2="320"/>
    <line x1="592" y1="170" x2="608" y2="170"/>
    <line x1="592" y1="320" x2="608" y2="320"/>
  </g>
  <text x="616" y="240" fill="#5694ca" font-size="15" font-weight="800">+£60m</text>
  <text x="616" y="258" fill="#5694ca" font-size="10" font-weight="700" letter-spacing="1.5">STRATEGIC PREMIUM</text>

  <!-- Divider -->
  <line x1="200" y1="438" x2="1000" y2="438" stroke="#2a2d3e" stroke-width="1"/>

  <!-- Main title -->
  <text x="600" y="492" text-anchor="middle" fill="#f0f0f0" font-size="40" font-weight="700" letter-spacing="-0.5">Pricing the ArcKit Project</text>
  <text x="600" y="536" text-anchor="middle" fill="#f0f0f0" font-size="40" font-weight="700" letter-spacing="-0.5">What an Investor Would Actually Pay</text>

  <!-- Tagline -->
  <text x="600" y="572" text-anchor="middle" fill="#b1b4b6" font-size="17" letter-spacing="0.5">Two numbers. Same asset. The spread is the story.</text>

  <!-- Stat strip -->
  <g transform="translate(0, 614)">
    <g transform="translate(170, 0)">
      <text x="60" y="20" text-anchor="middle" fill="#f0f0f0" font-size="30" font-weight="800" letter-spacing="-1">£20m</text>
      <text x="60" y="44" text-anchor="middle" fill="#9b9ea3" font-size="11" letter-spacing="1.5" font-weight="600">FINANCIAL FLOOR</text>
    </g>
    <line x1="370" y1="0" x2="370" y2="52" stroke="#2a2d3e" stroke-width="1"/>
    <g transform="translate(420, 0)">
      <text x="60" y="20" text-anchor="middle" fill="#f0f0f0" font-size="30" font-weight="800" letter-spacing="-1">£80m</text>
      <text x="60" y="44" text-anchor="middle" fill="#9b9ea3" font-size="11" letter-spacing="1.5" font-weight="600">STRATEGIC CENTRAL</text>
    </g>
    <line x1="620" y1="0" x2="620" y2="52" stroke="#2a2d3e" stroke-width="1"/>
    <g transform="translate(670, 0)">
      <text x="60" y="20" text-anchor="middle" fill="#f0f0f0" font-size="30" font-weight="800" letter-spacing="-1">4×</text>
      <text x="60" y="44" text-anchor="middle" fill="#9b9ea3" font-size="11" letter-spacing="1.5" font-weight="600">PREMIUM SPREAD</text>
    </g>
    <line x1="870" y1="0" x2="870" y2="52" stroke="#2a2d3e" stroke-width="1"/>
    <g transform="translate(920, 0)">
      <text x="60" y="20" text-anchor="middle" fill="#f0f0f0" font-size="30" font-weight="800" letter-spacing="-1">£150m+</text>
      <text x="60" y="44" text-anchor="middle" fill="#9b9ea3" font-size="11" letter-spacing="1.5" font-weight="600">AUCTION CEILING</text>
    </g>
  </g>
</svg>
