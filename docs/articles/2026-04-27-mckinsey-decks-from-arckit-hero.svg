<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="'Segoe UI', system-ui, -apple-system, 'DejaVu Sans', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0c0c"/>
      <stop offset="100%" style="stop-color:#1a1d2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1d70b8"/>
      <stop offset="100%" style="stop-color:#5694ca"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="680" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#f0f0f0" stroke-width="0.5">
    <g><line x1="40" y1="0" x2="40" y2="680"/><line x1="80" y1="0" x2="80" y2="680"/><line x1="120" y1="0" x2="120" y2="680"/><line x1="160" y1="0" x2="160" y2="680"/><line x1="200" y1="0" x2="200" y2="680"/><line x1="240" y1="0" x2="240" y2="680"/><line x1="280" y1="0" x2="280" y2="680"/><line x1="320" y1="0" x2="320" y2="680"/><line x1="360" y1="0" x2="360" y2="680"/><line x1="400" y1="0" x2="400" y2="680"/><line x1="440" y1="0" x2="440" y2="680"/><line x1="480" y1="0" x2="480" y2="680"/><line x1="520" y1="0" x2="520" y2="680"/><line x1="560" y1="0" x2="560" y2="680"/><line x1="600" y1="0" x2="600" y2="680"/><line x1="640" y1="0" x2="640" y2="680"/><line x1="680" y1="0" x2="680" y2="680"/><line x1="720" y1="0" x2="720" y2="680"/><line x1="760" y1="0" x2="760" y2="680"/><line x1="800" y1="0" x2="800" y2="680"/><line x1="840" y1="0" x2="840" y2="680"/><line x1="880" y1="0" x2="880" y2="680"/><line x1="920" y1="0" x2="920" y2="680"/><line x1="960" y1="0" x2="960" y2="680"/><line x1="1000" y1="0" x2="1000" y2="680"/><line x1="1040" y1="0" x2="1040" y2="680"/><line x1="1080" y1="0" x2="1080" y2="680"/><line x1="1120" y1="0" x2="1120" y2="680"/><line x1="1160" y1="0" x2="1160" y2="680"/></g>
    <g><line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="280" x2="1200" y2="280"/><line x1="0" y1="320" x2="1200" y2="320"/><line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="440" x2="1200" y2="440"/><line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="520" x2="1200" y2="520"/><line x1="0" y1="560" x2="1200" y2="560"/><line x1="0" y1="600" x2="1200" y2="600"/><line x1="0" y1="640" x2="1200" y2="640"/></g>
  </g>

  <!-- Top kicker -->
  <text x="600" y="68" text-anchor="middle" fill="#b1b4b6" font-size="14" letter-spacing="3" font-weight="600">ARCKIT  +  ANTV INFOGRAPHIC  ·  THE FOUR-PROMPT MCKINSEY DECK</text>

  <!-- Pipeline: 3 cards + 2 arrows -->
  <!-- Y centre band: 130 to 360 -->

  <!-- CARD 1: ArcKit Markdown artefact -->
  <g filter="url(#cardShadow)">
    <rect x="80" y="135" width="290" height="240" rx="10" fill="#161824" stroke="#2a2d3e" stroke-width="1"/>
    <!-- Document icon header -->
    <rect x="80" y="135" width="290" height="42" rx="10" fill="#1d70b8"/>
    <rect x="80" y="160" width="290" height="17" fill="#1d70b8"/>
    <text x="225" y="163" text-anchor="middle" fill="#ffffff" font-size="13" letter-spacing="2" font-weight="700">ARCKIT  ·  MARKDOWN</text>
    <!-- Mini doc lines -->
    <g fill="#9b9ea3">
      <text x="100" y="208" font-size="13" font-weight="700" fill="#f0f0f0">ARC-001-SOBC-v1.0</text>
      <rect x="100" y="225" width="240" height="6" rx="2" opacity="0.45"/>
      <rect x="100" y="240" width="200" height="6" rx="2" opacity="0.35"/>
      <rect x="100" y="255" width="220" height="6" rx="2" opacity="0.45"/>
    </g>
    <text x="100" y="290" fill="#5694ca" font-size="12" font-weight="700" letter-spacing="1">## STRATEGIC CASE</text>
    <g fill="#9b9ea3">
      <rect x="100" y="302" width="230" height="5" rx="2" opacity="0.35"/>
      <rect x="100" y="314" width="180" height="5" rx="2" opacity="0.35"/>
    </g>
    <text x="100" y="338" fill="#5694ca" font-size="12" font-weight="700" letter-spacing="1">## ECONOMIC CASE</text>
    <g fill="#9b9ea3">
      <rect x="100" y="350" width="200" height="5" rx="2" opacity="0.35"/>
    </g>
  </g>

  <!-- ARROW 1 -->
  <g stroke="#5694ca" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="385" y1="255" x2="445" y2="255"/>
    <polyline points="430,243 445,255 430,267"/>
  </g>

  <!-- CARD 2: Visualize plugin transform -->
  <g filter="url(#cardShadow)">
    <rect x="455" y="135" width="290" height="240" rx="10" fill="#161824" stroke="#2a2d3e" stroke-width="1"/>
    <rect x="455" y="135" width="290" height="42" rx="10" fill="#00703c"/>
    <rect x="455" y="160" width="290" height="17" fill="#00703c"/>
    <text x="600" y="163" text-anchor="middle" fill="#ffffff" font-size="13" letter-spacing="2" font-weight="700">ANTV INFOGRAPHIC</text>

    <!-- Stylised "wand / transform" - three concentric circles + sparkle -->
    <g transform="translate(600, 270)" filter="url(#softGlow)">
      <circle r="58" fill="none" stroke="#00703c" stroke-width="2" opacity="0.35"/>
      <circle r="42" fill="none" stroke="#5694ca" stroke-width="2" opacity="0.55"/>
      <circle r="26" fill="#1d70b8" opacity="0.85"/>
      <text y="6" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="800">{ }</text>
    </g>

    <text x="600" y="356" text-anchor="middle" fill="#9b9ea3" font-size="11" letter-spacing="1.5" font-weight="600">PYRAMID  ·  2x2  ·  HIERARCHY  ·  STAIRS</text>
  </g>

  <!-- ARROW 2 -->
  <g stroke="#5694ca" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="760" y1="255" x2="820" y2="255"/>
    <polyline points="805,243 820,255 805,267"/>
  </g>

  <!-- CARD 3: Single McKinsey-style slide -->
  <g filter="url(#cardShadow)">
    <!-- One slide, framed cleanly -->
    <rect x="830" y="135" width="290" height="240" rx="6" fill="#ffffff" stroke="#2a2d3e" stroke-width="1"/>
    <!-- Action title (Pyramid Principle: lead with the answer) -->
    <text x="848" y="170" fill="#0b0c0c" font-size="13" font-weight="800">Replace the legacy portal to</text>
    <text x="848" y="188" fill="#0b0c0c" font-size="13" font-weight="800">save GBP 12m over 5 years</text>
    <line x1="848" y1="200" x2="1100" y2="200" stroke="#1d70b8" stroke-width="2"/>
    <!-- 2x2 vendor positioning quadrant (McKinsey's most iconic visual) -->
    <g>
      <!-- L-shape axes with arrowheads -->
      <line x1="900" y1="325" x2="1100" y2="325" stroke="#0b0c0c" stroke-width="1"/>
      <line x1="900" y1="225" x2="900" y2="325" stroke="#0b0c0c" stroke-width="1"/>
      <polygon points="1096,321 1104,325 1096,329" fill="#0b0c0c"/>
      <polygon points="896,229 900,222 904,229" fill="#0b0c0c"/>
      <!-- Quadrant divider lines (dashed mid-cross) -->
      <line x1="1000" y1="225" x2="1000" y2="325" stroke="#b1b4b6" stroke-width="0.6" stroke-dasharray="3,2"/>
      <line x1="900" y1="275" x2="1100" y2="275" stroke="#b1b4b6" stroke-width="0.6" stroke-dasharray="3,2"/>
      <!-- Vendor B (top-left: compliant but expensive) -->
      <circle cx="945" cy="250" r="7" fill="#1d70b8" opacity="0.7"/>
      <text x="945" y="253" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="700">B</text>
      <!-- Vendor C (bottom-right: cheap but non-compliant) -->
      <circle cx="1055" cy="305" r="7" fill="#1d70b8" opacity="0.7"/>
      <text x="1055" y="308" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="700">C</text>
      <!-- Vendor A (top-right winner: compliant AND low cost — bigger, green) -->
      <circle cx="1060" cy="245" r="11" fill="#00703c"/>
      <text x="1060" y="249" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="800">A</text>
      <!-- "Recommended" callout above the winner -->
      <text x="1095" y="218" text-anchor="end" font-size="9" fill="#00703c" font-weight="800">★ RECOMMENDED</text>
      <!-- Axis labels -->
      <text x="1100" y="340" text-anchor="end" font-size="9" fill="#505a5f" font-weight="600">5-year cost →</text>
      <text x="892" y="275" text-anchor="middle" font-size="9" fill="#505a5f" font-weight="600" transform="rotate(-90 892 275)">CAF compliance ↑</text>
    </g>
    <!-- McKinsey-style footer: source + slide number -->
    <line x1="848" y1="346" x2="1100" y2="346" stroke="#d8d8d8" stroke-width="0.5"/>
    <text x="848" y="362" fill="#9b9ea3" font-size="9" font-weight="600">Source: ARC-001-SOBC-v1.0</text>
    <text x="1100" y="362" text-anchor="end" fill="#9b9ea3" font-size="9" font-weight="600">3 / 12</text>

    <!-- Below: label -->
    <text x="975" y="402" text-anchor="middle" fill="#b1b4b6" font-size="13" letter-spacing="2" font-weight="700">MCKINSEY-STYLE SLIDE</text>
  </g>

  <!-- Card labels under each -->
  <text x="225" y="402" text-anchor="middle" fill="#b1b4b6" font-size="13" letter-spacing="2" font-weight="700">SOURCE OF TRUTH</text>
  <text x="600" y="402" text-anchor="middle" fill="#b1b4b6" font-size="13" letter-spacing="2" font-weight="700">TRANSFORM</text>

  <!-- Divider -->
  <line x1="200" y1="438" x2="1000" y2="438" stroke="#2a2d3e" stroke-width="1"/>

  <!-- Main title -->
  <text x="600" y="492" text-anchor="middle" fill="#f0f0f0" font-size="40" font-weight="700" letter-spacing="-0.5">From ArcKit Markdown to McKinsey-Style</text>
  <text x="600" y="536" text-anchor="middle" fill="#f0f0f0" font-size="40" font-weight="700" letter-spacing="-0.5">Infographics in an Afternoon</text>

  <!-- Tagline -->
  <text x="600" y="572" text-anchor="middle" fill="#b1b4b6" font-size="17" letter-spacing="0.5">Two open-source plugins. Four prompts. The same deliverable a Big 4 charges GBP 200k for.</text>

  <!-- Stat strip -->
  <g transform="translate(0, 614)">
    <g transform="translate(170, 0)">
      <text x="60" y="20" text-anchor="middle" fill="#f0f0f0" font-size="30" font-weight="800" letter-spacing="-1">~200</text>
      <text x="60" y="44" text-anchor="middle" fill="#9b9ea3" font-size="11" letter-spacing="1.5" font-weight="600">INFOGRAPHIC TEMPLATES</text>
    </g>
    <line x1="370" y1="0" x2="370" y2="52" stroke="#2a2d3e" stroke-width="1"/>
    <g transform="translate(420, 0)">
      <text x="60" y="20" text-anchor="middle" fill="#f0f0f0" font-size="30" font-weight="800" letter-spacing="-1">4</text>
      <text x="60" y="44" text-anchor="middle" fill="#9b9ea3" font-size="11" letter-spacing="1.5" font-weight="600">PROMPTS END-TO-END</text>
    </g>
    <line x1="620" y1="0" x2="620" y2="52" stroke="#2a2d3e" stroke-width="1"/>
    <g transform="translate(670, 0)">
      <text x="60" y="20" text-anchor="middle" fill="#f0f0f0" font-size="30" font-weight="800" letter-spacing="-1">86h</text>
      <text x="60" y="44" text-anchor="middle" fill="#9b9ea3" font-size="11" letter-spacing="1.5" font-weight="600">ASSOCIATE TIME REPLACED</text>
    </g>
    <line x1="870" y1="0" x2="870" y2="52" stroke="#2a2d3e" stroke-width="1"/>
    <g transform="translate(920, 0)">
      <text x="60" y="20" text-anchor="middle" fill="#f0f0f0" font-size="30" font-weight="800" letter-spacing="-1">GBP 0</text>
      <text x="60" y="44" text-anchor="middle" fill="#9b9ea3" font-size="11" letter-spacing="1.5" font-weight="600">LICENCE COST</text>
    </g>
  </g>
</svg>
