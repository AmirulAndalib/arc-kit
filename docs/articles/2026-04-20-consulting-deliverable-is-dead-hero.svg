<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="'Segoe UI', system-ui, -apple-system, 'DejaVu Sans', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0c0c"/>
      <stop offset="100%" style="stop-color:#1a1d2e"/>
    </linearGradient>
    <linearGradient id="redFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4351c;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#d4351c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d4351c;stop-opacity:0"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="680" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#f0f0f0" stroke-width="0.5">
    <g><line x1="40" y1="0" x2="40" y2="680"/><line x1="80" y1="0" x2="80" y2="680"/><line x1="120" y1="0" x2="120" y2="680"/><line x1="160" y1="0" x2="160" y2="680"/><line x1="200" y1="0" x2="200" y2="680"/><line x1="240" y1="0" x2="240" y2="680"/><line x1="280" y1="0" x2="280" y2="680"/><line x1="320" y1="0" x2="320" y2="680"/><line x1="360" y1="0" x2="360" y2="680"/><line x1="400" y1="0" x2="400" y2="680"/><line x1="440" y1="0" x2="440" y2="680"/><line x1="480" y1="0" x2="480" y2="680"/><line x1="520" y1="0" x2="520" y2="680"/><line x1="560" y1="0" x2="560" y2="680"/><line x1="600" y1="0" x2="600" y2="680"/><line x1="640" y1="0" x2="640" y2="680"/><line x1="680" y1="0" x2="680" y2="680"/><line x1="720" y1="0" x2="720" y2="680"/><line x1="760" y1="0" x2="760" y2="680"/><line x1="800" y1="0" x2="800" y2="680"/><line x1="840" y1="0" x2="840" y2="680"/><line x1="880" y1="0" x2="880" y2="680"/><line x1="920" y1="0" x2="920" y2="680"/><line x1="960" y1="0" x2="960" y2="680"/><line x1="1000" y1="0" x2="1000" y2="680"/><line x1="1040" y1="0" x2="1040" y2="680"/><line x1="1080" y1="0" x2="1080" y2="680"/><line x1="1120" y1="0" x2="1120" y2="680"/><line x1="1160" y1="0" x2="1160" y2="680"/></g>
    <g><line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="280" x2="1200" y2="280"/><line x1="0" y1="320" x2="1200" y2="320"/><line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="440" x2="1200" y2="440"/><line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="520" x2="1200" y2="520"/><line x1="0" y1="560" x2="1200" y2="560"/><line x1="0" y1="600" x2="1200" y2="600"/><line x1="0" y1="640" x2="1200" y2="640"/></g>
  </g>

  <!-- Top kicker -->
  <text x="600" y="76" text-anchor="middle" fill="#b1b4b6" font-size="14" letter-spacing="3" font-weight="600">ARCKIT  ·  THE BILLION-POUND DELIVERABLE</text>

  <!-- The big number: £1bn -->
  <text x="600" y="282" text-anchor="middle" fill="#f0f0f0" font-size="220" font-weight="800" letter-spacing="-6" filter="url(#softGlow)" font-family="'DejaVu Sans', 'Segoe UI', system-ui, sans-serif">&#163;1bn</text>

  <!-- Strikethrough across the number -->
  <line x1="280" y1="232" x2="920" y2="232" stroke="url(#redFade)" stroke-width="6" stroke-linecap="round"/>

  <!-- Caption under number -->
  <text x="600" y="328" text-anchor="middle" fill="#9b9ea3" font-size="16" letter-spacing="2" font-weight="500">ANNUAL UK PUBLIC-SECTOR CONSULTING SPEND ON DOCUMENT DRAFTING AND DESK RESEARCH</text>
  <text x="600" y="352" text-anchor="middle" fill="#6b6e72" font-size="12" letter-spacing="1.5" font-weight="500">SOURCE: CABINET OFFICE / TUSSELL ESTIMATES, FY2023</text>

  <!-- Divider -->
  <line x1="200" y1="386" x2="1000" y2="386" stroke="#2a2d3e" stroke-width="1"/>

  <!-- Main title -->
  <text x="600" y="442" text-anchor="middle" fill="#f0f0f0" font-size="44" font-weight="700" letter-spacing="-0.5">How ArcKit Is Quietly Destroying</text>
  <text x="600" y="488" text-anchor="middle" fill="#f0f0f0" font-size="44" font-weight="700" letter-spacing="-0.5">a Billion-Pound Consulting Business</text>

  <!-- Tagline -->
  <text x="600" y="524" text-anchor="middle" fill="#b1b4b6" font-size="17" letter-spacing="0.5">Open-source  ·  Six months old  ·  Maintained on evenings and weekends</text>

  <!-- Stat strip -->
  <g transform="translate(0, 588)">
    <g transform="translate(170, 0)">
      <text x="60" y="20" text-anchor="middle" fill="#f0f0f0" font-size="34" font-weight="800" letter-spacing="-1">1,669</text>
      <text x="60" y="46" text-anchor="middle" fill="#9b9ea3" font-size="11" letter-spacing="2" font-weight="600">GITHUB STARS</text>
    </g>
    <line x1="370" y1="0" x2="370" y2="56" stroke="#2a2d3e" stroke-width="1"/>
    <g transform="translate(420, 0)">
      <text x="60" y="20" text-anchor="middle" fill="#f0f0f0" font-size="34" font-weight="800" letter-spacing="-1">195</text>
      <text x="60" y="46" text-anchor="middle" fill="#9b9ea3" font-size="11" letter-spacing="2" font-weight="600">FORKS</text>
    </g>
    <line x1="620" y1="0" x2="620" y2="56" stroke="#2a2d3e" stroke-width="1"/>
    <g transform="translate(670, 0)">
      <text x="60" y="20" text-anchor="middle" fill="#f0f0f0" font-size="34" font-weight="800" letter-spacing="-1">68</text>
      <text x="60" y="46" text-anchor="middle" fill="#9b9ea3" font-size="11" letter-spacing="2" font-weight="600">BASELINE COMMANDS</text>
    </g>
    <line x1="870" y1="0" x2="870" y2="56" stroke="#2a2d3e" stroke-width="1"/>
    <g transform="translate(920, 0)">
      <text x="60" y="20" text-anchor="middle" fill="#f0f0f0" font-size="34" font-weight="800" letter-spacing="-1">22</text>
      <text x="60" y="46" text-anchor="middle" fill="#9b9ea3" font-size="11" letter-spacing="2" font-weight="600">REGULATORY OVERLAYS</text>
    </g>
  </g>
</svg>
